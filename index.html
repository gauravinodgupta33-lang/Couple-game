<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Board Game</title>
    <style>
        :root { 
            --rose: #e11d48; 
            --bg: #0a0507;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body { 
            margin: 0; padding: 20px; background: var(--bg); color: #fff; 
            font-family: 'Outfit', sans-serif; display: flex; justify-content: center; min-height: 100vh;
        }
        .container { max-width: 420px; width: 100%; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-size: 1.2rem; letter-spacing: 0.4rem; text-transform: uppercase; 
            color: var(--rose); text-shadow: 0 0 30px rgba(225, 29, 72, 0.4);
        }
        
        .status-bar { 
            text-align: center; margin-bottom: 25px; padding: 15px;
            background: rgba(225, 29, 72, 0.1); border-radius: 20px;
            border: 1px solid rgba(225, 29, 72, 0.2); font-size: 0.8rem; letter-spacing: 0.15rem;
        }

        .board { 
            background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(0,0,0,0.2));
            padding: 20px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px); box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .cell { 
            aspect-ratio: 1; background: rgba(0,0,0,0.3); border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.15);
        }
        
        .token { 
            font-size: 18px; position: absolute; transition: all 0.7s cubic-bezier(0.2, 0.8, 0.2, 1); 
            z-index: 5; filter: drop-shadow(0 0 10px var(--rose)); 
        }
        
        .dice-area { display: flex; flex-direction: column; align-items: center; gap: 20px; margin: 35px 0; }
        .dice-display { 
            width: 65px; height: 65px; background: rgba(255,255,255,0.04); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 22px; font-weight: 800; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        .roll-btn { 
            width: 100%; padding: 20px; background: var(--rose); border: none; 
            border-radius: 20px; color: white; font-weight: 700; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 0.2rem; transition: 0.4s;
        }
        .roll-btn:hover { filter: brightness(1.2); box-shadow: 0 0 30px rgba(225, 29, 72, 0.4); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .card { 
            background: #0d0508; border: 1px solid var(--rose); padding: 40px; 
            border-radius: 40px; text-align: center; width: 75%;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Couple Board Game</h1></div>
    <div class="status-bar" id="status-display">VAMP'S TURN (👅)</div>
    
    <div class="board"><div class="grid" id="grid"></div></div>
    
    <div class="dice-area">
        <div class="dice-display" id="dice-val">🎲</div>
        <button class="roll-btn" id="roll-btn" onclick="rollDice()">Roll Dice</button>
    </div>
    
    <div class="overlay" id="overlay">
        <div class="card">
            <h2 id="card-square" style="color:var(--rose); font-size: 1.1rem; margin-top:0;">SQUARE 1</h2>
            <p id="card-text" style="margin: 30px 0; font-size: 1rem; line-height: 1.6; opacity: 0.9;">...</p>
            <div style="display:flex; gap:10px;">
                <button class="roll-btn" style="background: transparent; border: 1px solid var(--rose);" onclick="tryAgain()">Retry</button>
                <button class="roll-btn" onclick="acceptTask()">Accept</button>
            </div>
        </div>
    </div>
</div>

<script>
    const taskDatabase = { /* Add your 200 tasks */ };
    let state = { p1: 1, p2: 1, active: 1, currentRoll: 0 };

    function updateStatus() {
        document.getElementById('status-display').innerText = state.active === 1 ? "VAMP'S TURN (👅)" : "RABBIT'S TURN (🐇)";
    }

    function drawBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let currentPos = state.active === 1 ? state.p1 : state.p2;
        let base = Math.min(171, Math.floor((Math.max(1, currentPos - 12) - 1) / 5) * 5 + 1);

        for(let i=0; i<30; i++) {
            let num = base + i;
            if(num > 200) break;
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = num;
            if(state.p1 === num) cell.innerHTML += '<div class="token">👅</div>';
            if(state.p2 === num) cell.innerHTML += '<div class="token">🐇</div>';
            grid.appendChild(cell);
        }
    }

    function rollDice() {
        document.getElementById('roll-btn').disabled = true;
        state.currentRoll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-val').innerText = state.currentRoll;
        animateSteps(state.currentRoll);
    }

    function animateSteps(steps) {
        if (steps <= 0) {
            document.getElementById('card-text').innerText = taskDatabase[state.active === 1 ? state.p1 : state.p2] || "Perform the task!";
            document.getElementById('card-square').innerText = `SQUARE ${state.active === 1 ? state.p1 : state.p2}`;
            document.getElementById('overlay').style.display = 'flex';
            return;
        }
        if (state.active === 1) state.p1 = Math.min(200, state.p1 + 1);
        else state.p2 = Math.min(200, state.p2 + 1);
        drawBoard();
        setTimeout(() => animateSteps(steps - 1), 300);
    }

    function tryAgain() {
        document.getElementById('overlay').style.display = 'none';
        if(state.active === 1) state.p1 = Math.max(1, state.p1 - state.currentRoll);
        else state.p2 = Math.max(1, state.p2 - state.currentRoll);
        drawBoard();
        document.getElementById('roll-btn').disabled = false;
    }

    function acceptTask() {
        document.getElementById('overlay').style.display = 'none';
        state.active = state.active === 1 ? 2 : 1;
        updateStatus();
        document.getElementById('roll-btn').disabled = false;
        document.getElementById('dice-val').innerText = "🎲";
    }

    drawBoard();
</script>
</body>
</html>
