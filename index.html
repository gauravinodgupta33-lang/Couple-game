<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intimacy Board Game</title>
    <style>
        :root { --p1-glow: #facc15; --p2-glow: #f43f5e; --bg: #0a0409; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; padding: 20px; }
        
        .board { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 20px; backdrop-filter: blur(10px); }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .cell { aspect-ratio: 1; background: rgba(0,0,0,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.2); position: relative; border: 1px solid rgba(255,255,255,0.05); }
        
        .token { font-size: 22px; position: absolute; transition: all 0.3s ease; z-index: 5; }
        .p1-token { filter: drop-shadow(0 0 8px var(--p1-glow)); }
        .p2-token { filter: drop-shadow(0 0 8px var(--p2-glow)); }
        
        /* Dice Style */
        .dice-view { width: 80px; height: 80px; margin: 20px auto; background: white; color: black; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; border-radius: 20px; cursor: pointer; transition: transform 0.2s; }
        .rolling { animation: spin 0.5s linear infinite; }
        @keyframes spin { 100% { transform: rotateY(360deg); } }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .card { background: linear-gradient(180deg, #250a1b 0%, #0a0409 100%); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 40px; text-align: center; width: 80%; }
        .btn-roll { width: 100%; padding: 20px; background: linear-gradient(90deg, #ec4899, #be185d); border: none; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-act { padding: 12px 25px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; opacity:0.7">Intimacy Board</h2>
    <div class="board"><div class="grid" id="grid"></div></div>
    
    <div class="dice-view" id="dice" onclick="rollDice()">ROLL</div>
    
    <div class="overlay" id="overlay">
        <div class="card">
            <h3 id="card-square" style="color: #ec4899;">SQUARE 1</h3>
            <p id="card-text"></p>
            <button class="btn-act" onclick="tryAgain()">Try Again</button>
            <button class="btn-act" style="background:#ec4899; color:white" onclick="acceptTask()">Accept</button>
        </div>
    </div>
</div>

<script>
    const taskDatabase = { /* Add your 200 tasks here */ };
    let state = { p1: 1, p2: 1, active: 1 };

    function drawBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let currentPos = state.active === 1 ? state.p1 : state.p2;
        let base = Math.min(171, Math.floor((Math.max(1, currentPos - 12) - 1) / 5) * 5 + 1);

        for(let i=0; i<30; i++) {
            let num = base + i;
            if(num > 200) break;
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = num;
            if(state.p1 === num) cell.innerHTML += '<div class="token p1-token">👅</div>';
            if(state.p2 === num) cell.innerHTML += '<div class="token p2-token">🐇</div>';
            grid.appendChild(cell);
        }
    }

    function rollDice() {
        const dice = document.getElementById('dice');
        dice.classList.add('rolling');
        setTimeout(() => {
            let roll = Math.floor(Math.random() * 6) + 1;
            dice.classList.remove('rolling');
            dice.innerText = roll;
            animateSteps(roll);
        }, 1000);
    }

    function animateSteps(steps) {
        if (steps <= 0) {
            document.getElementById('card-text').innerText = taskDatabase[state.active === 1 ? state.p1 : state.p2] || "Perform the task!";
            document.getElementById('card-square').innerText = `SQUARE ${state.active === 1 ? state.p1 : state.p2}`;
            document.getElementById('overlay').style.display = 'flex';
            return;
        }
        if (state.active === 1) state.p1 = Math.min(200, state.p1 + 1);
        else state.p2 = Math.min(200, state.p2 + 1);
        drawBoard();
        setTimeout(() => animateSteps(steps - 1), 300);
    }

    function tryAgain() {
        document.getElementById('overlay').style.display = 'none';
        state.active === 1 ? state.p1-- : state.p2--;
        drawBoard();
    }

    function acceptTask() {
        document.getElementById('overlay').style.display = 'none';
        state.active = state.active === 1 ? 2 : 1;
    }

    drawBoard();
</script>
</body>
</html>
