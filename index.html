<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intimacy Board Game</title>
    <style>
        :root { --accent: #ec4899; --glow: rgba(236, 72, 153, 0.5); --bg: #0f050b; }
        body { margin: 0; padding: 20px; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; }
        
        /* Glowing Pink Board */
        .board { background: #1a0510; padding: 20px; border-radius: 30px; border: 2px solid var(--accent); box-shadow: 0 0 20px var(--glow); }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .cell { aspect-ratio: 1; background: #2d0a1d; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #ff85c2; position: relative; border: 1px solid var(--accent); }
        
        .token { font-size: 20px; position: absolute; transition: all 0.4s ease; z-index: 5; filter: drop-shadow(0 0 8px white); }
        
        /* UI Elements */
        .status-bar { text-align: center; margin: 20px 0; font-size: 1.2rem; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .dice-display { width: 60px; height: 60px; margin: 10px auto; background: white; color: black; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border-radius: 15px; border: 3px solid var(--accent); }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .card { background: #1f0815; border: 2px solid var(--accent); padding: 30px; border-radius: 30px; text-align: center; width: 85%; }
        .roll-btn { width: 100%; padding: 20px; background: var(--accent); border: none; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-bar" id="status-display">Vamp's Turn (👅)</div>
    <div class="board">
        <div class="grid" id="grid"></div>
    </div>
    
    <div class="dice-display" id="dice-val">?</div>
    <button class="roll-btn" id="roll-btn" onclick="rollDice()">ROLL DICE</button>
    
    <div class="overlay" id="overlay">
        <div class="card">
            <h2 id="card-square" style="color:var(--accent)">SQUARE 1</h2>
            <p id="card-text">...</p>
            <div style="display:flex; gap:10px;">
                <button class="roll-btn" onclick="tryAgain()">Try Again</button>
                <button class="roll-btn" onclick="acceptTask()">Accept</button>
            </div>
        </div>
    </div>
</div>

<script>
    const taskDatabase = { /* 1-200 tasks */ };
    let state = { p1: 1, p2: 1, active: 1, currentRoll: 0 };

    function updateStatus() {
        document.getElementById('status-display').innerText = state.active === 1 ? "Vamp's Turn (👅)" : "Rabbit's Turn (🐇)";
    }

    function drawBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let currentPos = state.active === 1 ? state.p1 : state.p2;
        let base = Math.min(171, Math.floor((Math.max(1, currentPos - 12) - 1) / 5) * 5 + 1);

        for(let i=0; i<30; i++) {
            let num = base + i;
            if(num > 200) break;
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = num;
            if(state.p1 === num) cell.innerHTML += '<div class="token">👅</div>';
            if(state.p2 === num) cell.innerHTML += '<div class="token">🐇</div>';
            grid.appendChild(cell);
        }
    }

    function rollDice() {
        document.getElementById('roll-btn').disabled = true;
        state.currentRoll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-val').innerText = state.currentRoll;
        animateSteps(state.currentRoll);
    }

    function animateSteps(steps) {
        if (steps <= 0) {
            document.getElementById('card-text').innerText = taskDatabase[state.active === 1 ? state.p1 : state.p2] || "Perform the task!";
            document.getElementById('card-square').innerText = `SQUARE ${state.active === 1 ? state.p1 : state.p2}`;
            document.getElementById('overlay').style.display = 'flex';
            return;
        }
        if (state.active === 1) state.p1 = Math.min(200, state.p1 + 1);
        else state.p2 = Math.min(200, state.p2 + 1);
        drawBoard();
        setTimeout(() => animateSteps(steps - 1), 400);
    }

    function tryAgain() {
        document.getElementById('overlay').style.display = 'none';
        if(state.active === 1) state.p1 = Math.max(1, state.p1 - state.currentRoll);
        else state.p2 = Math.max(1, state.p2 - state.currentRoll);
        drawBoard();
        document.getElementById('roll-btn').disabled = false;
    }

    function acceptTask() {
        document.getElementById('overlay').style.display = 'none';
        state.active = state.active === 1 ? 2 : 1;
        updateStatus();
        document.getElementById('roll-btn').disabled = false;
    }

    drawBoard();
</script>
</body>
</html>
