<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESIRE</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="background-glow"></div>

    <div class="app">

        <!-- Header -->
        <header class="top-header">

            <button class="music-btn">🎵</button>

            <div class="game-title">
                <p>An Intimate Game For Two</p>
                <h1>DESIRE</h1>
            </div>

            <button class="reward-btn">🎁 Rewards</button>

        </header>

        <!-- Players -->
        <section class="players">

            <!-- Left Player -->
            <div class="player left-player">

                <div class="avatar">
                    🧛‍♂️
                </div>

                <div class="player-info">
                    <h2>VAMP</h2>

                    <div class="progress">
                        <div class="fill"></div>
                    </div>
                </div>

            </div>

            <!-- Turn -->
            <div class="turn-box">
                VAMP'S TURN 😈
            </div>

            <!-- Right Player -->
            <div class="player right-player">

                <div class="player-info">

                    <h2>RABBIT</h2>

                    <div class="progress">
                        <div class="fill"></div>
                    </div>

                </div>

                <div class="avatar">
                    🐰
                </div>

            </div>

        </section>

        <!-- Game Board -->
        <main class="game-board">

        </main>

        <!-- Dice -->
        <div class="dice-section">

            <button class="undo-btn">
                Undo
            </button>

            <button id="dice">
                🎲
            </button>

            <button class="rules-btn">
                Rules
            </button>

        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">

            <button>🏠<span>Home</span></button>

            <button>📝<span>Tasks</span></button>

            <button>❤️</button>

            <button>🕒<span>History</span></button>

            <button>⚙️<span>Settings</span></button>

        </nav>

    </div>

    <script src="script.js"></script>

</body>
</html>
