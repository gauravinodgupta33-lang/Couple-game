<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --rose: #e11d48; --bg: #050204; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        
        /* Matching the UI aesthetic */
        .game-header { text-align: center; margin-bottom: 20px; }
        .game-header h1 { color: #fecdd3; letter-spacing: 0.3rem; text-transform: uppercase; font-weight: 300; }
        
        .board { 
            background: #110a0e; 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid #3d1a25; 
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.2);
        }
        
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; }
        
        .cell { 
            width: 40px; height: 40px; 
            background: #1a1014; 
            border: 1px solid #331620; 
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; color: #665;
            position: relative;
        }

        /* Avatar styling matching the provided UI */
        .avatar { width: 35px; height: 35px; z-index: 10; filter: drop-shadow(0 0 5px var(--rose)); }
        
        .roll-area { margin-top: 30px; text-align: center; }
        .dice { 
            width: 80px; height: 80px; background: #1a1014; 
            border: 2px solid var(--rose); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; cursor: pointer; box-shadow: 0 0 15px var(--rose);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="game-header">
        <h1>DESIRE</h1>
    </div>

    <div class="board">
        <div class="grid" id="grid">
            <!-- Grid generated by script -->
        </div>
    </div>

    <div class="roll-area">
        <div class="dice" onclick="roll()">🎲</div>
        <p>TAP TO ROLL</p>
    </div>
</div>

<script>
    let p1 = 1, p2 = 1;
    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for(let i=1; i<=200; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i;
            if(i === p1) cell.innerHTML = '<img src="vamp.png" class="avatar">';
            if(i === p2) cell.innerHTML = '<img src="rabbit.png" class="avatar">';
            grid.appendChild(cell);
        }
    }
    render();
</script>
</body>
</html>
