<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Board Game</title>
    <style>
        :root { 
            --accent: #e11d48; /* Deep Rose Red */
            --glass: rgba(255, 255, 255, 0.08); 
            --bg: #0f0508;
        }
        body { 
            margin: 0; padding: 20px; background: var(--bg); color: #fff; 
            font-family: 'Inter', system-ui, sans-serif; display: flex; justify-content: center; min-height: 100vh;
        }
        .container { max-width: 450px; width: 100%; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 1.6rem; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); text-shadow: 0 0 20px var(--accent); }
        
        .status-bar { 
            text-align: center; margin-bottom: 20px; font-size: 0.95rem; font-weight: 600;
            padding: 15px; background: var(--glass); border-radius: 20px; 
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
        }

        .board { 
            background: var(--glass); padding: 25px; border-radius: 40px; 
            border: 1px solid rgba(225, 29, 72, 0.4); backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .cell { 
            aspect-ratio: 1; background: rgba(0,0,0,0.3); border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.3);
        }
        
        .token { font-size: 20px; position: absolute; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 5; filter: drop-shadow(0 0 8px var(--accent)); }
        
        .dice-area { display: flex; flex-direction: column; align-items: center; gap: 15px; margin: 30px 0; }
        .dice-display { 
            width: 70px; height: 70px; background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; 
            font-size: 28px; font-weight: 900; border-radius: 20px; border: 2px solid var(--accent);
        }

        .roll-btn { 
            width: 100%; padding: 20px; background: var(--accent); border: none; 
            border-radius: 20px; color: white; font-weight: 700; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(225, 29, 72, 0.3);
        }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .card { 
            background: rgba(25, 5, 15, 0.8); border: 1px solid var(--accent); padding: 40px; 
            border-radius: 40px; text-align: center; width: 80%; box-shadow: 0 0 40px var(--accent);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Couple Board Game</h1></div>
    <div class="status-bar" id="status-display">Vamp's Turn (👅)</div>
    
    <div class="board"><div class="grid" id="grid"></div></div>
    
    <div class="dice-area">
        <div class="dice-display" id="dice-val">🎲</div>
        <button class="roll-btn" id="roll-btn" onclick="rollDice()">Roll Dice</button>
    </div>
    
    <div class="overlay" id="overlay">
        <div class="card">
            <h2 id="card-square" style="color:var(--accent); margin-top:0;">SQUARE 1</h2>
            <p id="card-text" style="margin: 20px 0; line-height: 1.6;">...</p>
            <div style="display:flex; gap:10px;">
                <button class="roll-btn" style="background: transparent; border: 1px solid var(--accent);" onclick="tryAgain()">Retry</button>
                <button class="roll-btn" onclick="acceptTask()">Accept</button>
            </div>
        </div>
    </div>
</div>

<script>
    const taskDatabase = { /* 1-200 tasks */ };
    let state = { p1: 1, p2: 1, active: 1, currentRoll: 0 };

    function updateStatus() {
        document.getElementById('status-display').innerText = state.active === 1 ? "Vamp's Turn (👅)" : "Rabbit's Turn (🐇)";
    }

    function drawBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let currentPos = state.active === 1 ? state.p1 : state.p2;
        let base = Math.min(171, Math.floor((Math.max(1, currentPos - 12) - 1) / 5) * 5 + 1);

        for(let i=0; i<30; i++) {
            let num = base + i;
            if(num > 200) break;
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = num;
            if(state.p1 === num) cell.innerHTML += '<div class="token">👅</div>';
            if(state.p2 === num) cell.innerHTML += '<div class="token">🐇</div>';
            grid.appendChild(cell);
        }
    }

    function rollDice() {
        document.getElementById('roll-btn').disabled = true;
        state.currentRoll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-val').innerText = state.currentRoll;
        animateSteps(state.currentRoll);
    }

    function animateSteps(steps) {
        if (steps <= 0) {
            document.getElementById('card-text').innerText = taskDatabase[state.active === 1 ? state.p1 : state.p2] || "Perform the task!";
            document.getElementById('card-square').innerText = `SQUARE ${state.active === 1 ? state.p1 : state.p2}`;
            document.getElementById('overlay').style.display = 'flex';
            return;
        }
        if (state.active === 1) state.p1 = Math.min(200, state.p1 + 1);
        else state.p2 = Math.min(200, state.p2 + 1);
        drawBoard();
        setTimeout(() => animateSteps(steps - 1), 300);
    }

    function tryAgain() {
        document.getElementById('overlay').style.display = 'none';
        if(state.active === 1) state.p1 = Math.max(1, state.p1 - state.currentRoll);
        else state.p2 = Math.max(1, state.p2 - state.currentRoll);
        drawBoard();
        document.getElementById('roll-btn').disabled = false;
    }

    function acceptTask() {
        document.getElementById('overlay').style.display = 'none';
        state.active = state.active === 1 ? 2 : 1;
        updateStatus();
        document.getElementById('roll-btn').disabled = false;
        document.getElementById('dice-val').innerText = "🎲";
    }

    drawBoard();
</script>
</body>
</html>
