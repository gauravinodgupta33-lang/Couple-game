<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intimacy Board Game</title>
    <style>
        :root { --bg: #121212; --cell: #1e1e1e; --p1: #FFD700; --p2: #FF4500; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; }
        
        .board { background: #000; border: 4px solid #333; border-radius: 20px; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .cell { aspect-ratio: 1; background: var(--cell); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #555; position: relative; border: 2px solid #000; }
        
        .token { font-size: 24px; position: absolute; z-index: 5; transition: all 0.5s ease; filter: drop-shadow(0 0 5px black); }
        .p1-token { color: var(--p1); }
        .p2-token { color: var(--p2); }

        .dice-container { display: flex; justify-content: center; margin: 20px 0; }
        .dice { width: 60px; height: 60px; background: white; color: black; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: transform 0.3s; }
        .rolling { animation: roll 0.5s linear infinite; }
        @keyframes roll { 0% { transform: rotateX(0deg); } 100% { transform: rotateX(360deg); } }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; }
        .card { background: #222; padding: 30px; border-radius: 20px; text-align: center; width: 80%; border: 2px solid #444; }
        button { padding: 15px 30px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="board"><div class="grid" id="grid"></div></div>
    
    <div class="dice-container">
        <div class="dice" id="dice" onclick="rollDice()">ROLL</div>
    </div>

    <div class="overlay" id="overlay">
        <div class="card">
            <h3 id="card-square">SQUARE 1</h3>
            <p id="card-text"></p>
            <button onclick="tryAgain()">Try Again</button>
            <button style="background: #e91e63; color: white;" onclick="acceptTask()">Accept</button>
        </div>
    </div>
</div>

<script>
    const taskDatabase = { /* Add your 200 tasks */ };
    let state = { p1: 1, p2: 1, active: 1, currentRoll: 0 };

    function drawBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let currentPos = state.active === 1 ? state.p1 : state.p2;
        let base = Math.min(171, Math.floor((Math.max(1, currentPos - 12) - 1) / 5) * 5 + 1);

        for(let i=0; i<30; i++) {
            let num = base + i;
            if(num > 200) break;
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = num;
            if(state.p1 === num) cell.innerHTML += '<div class="token p1-token">👅</div>';
            if(state.p2 === num) cell.innerHTML += '<div class="token p2-token">🐇</div>';
            grid.appendChild(cell);
        }
    }

    function rollDice() {
        const dice = document.getElementById('dice');
        dice.classList.add('rolling');
        setTimeout(() => {
            state.currentRoll = Math.floor(Math.random() * 6) + 1;
            dice.classList.remove('rolling');
            dice.innerText = state.currentRoll;
            animateSteps(state.currentRoll);
        }, 1000);
    }

    function animateSteps(steps) {
        if (steps <= 0) {
            document.getElementById('card-text').innerText = taskDatabase[state.active === 1 ? state.p1 : state.p2] || "Perform the task!";
            document.getElementById('card-square').innerText = `SQUARE ${state.active === 1 ? state.p1 : state.p2}`;
            document.getElementById('overlay').style.display = 'flex';
            return;
        }
        if (state.active === 1) state.p1 = Math.min(200, state.p1 + 1);
        else state.p2 = Math.min(200, state.p2 + 1);
        drawBoard();
        setTimeout(() => animateSteps(steps - 1), 400);
    }

    function tryAgain() {
        document.getElementById('overlay').style.display = 'none';
        state.active === 1 ? state.p1-- : state.p2--;
        drawBoard();
    }

    function acceptTask() {
        document.getElementById('overlay').style.display = 'none';
        state.active = state.active === 1 ? 2 : 1;
    }

    drawBoard();
</script>
</body>
</html>
