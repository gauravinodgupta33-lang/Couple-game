<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lovesick: A cozy game for two players.">
    <title>Lovesick | A Cosy Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        
        <header class="game__header">
    <p class="game__subtitle">A COSSY GAME FOR TWO</p>
    <h1 class="game__title">LOVESICK</h1>
    <div class="game__turn-indicator" id="turn-display">VAMP'S TURN 👅</div>
        </header>
        

        <section class="stats-bar">
            <div class="player-card" id="vamp-card">
                <div class="player-card__avatar" id="vamp-avatar"></div>
                <div class="player-card__details">
                    <span class="player-name">VAMP</span>
                    <div class="progress-bar"><div class="progress-bar__fill" id="vamp-progress"></div></div>
                    <span class="player-score">1 / 200</span>
                </div>
            </div>

            <div class="player-card" id="rabbit-card">
                <div class="player-card__details">
                    <span class="player-name">RABBIT</span>
                    <div class="progress-bar"><div class="progress-bar__fill" id="rabbit-progress"></div></div>
                    <span class="player-score">1 / 200</span>
                </div>
                <div class="player-card__avatar" id="rabbit-avatar"></div>
            </div>
        </section>

        <main class="board-viewport" id="board-viewport">
            <div class="board-track" id="board-track">
                </div>
            <div class="token-layer" id="token-layer">
                <div class="token vamp" id="token-vamp"></div>
                <div class="token rabbit" id="token-rabbit"></div>
            </div>
        </main>

        <footer class="game-footer">
            <button class="btn-roll" id="roll-btn">
                <span class="btn-roll__icon">🎲</span>
                <span class="btn-roll__text">TAP TO ROLL</span>
            </button>
        </footer>

        <div class="modal-overlay hidden" id="task-modal">
            <div class="modal-card">
                <h2 class="modal-title" id="task-title">Task Name</h2>
                <p class="modal-desc" id="task-desc">Task description goes here.</p>
                <div class="modal-actions">
                    <button class="btn-action accept" onclick="acceptTask()">Accept</button>
                    <button class="btn-action skip" onclick="skipTask()">Skip</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
