<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Board Game</title>
    <style>
        :root { 
            --rose: #e11d48; 
            --bg: #0a0507;
        }
        body { 
            margin: 0; padding: 20px; background: var(--bg); color: #fff; 
            font-family: 'Outfit', sans-serif; display: flex; justify-content: center; min-height: 100vh;
        }
        .container { max-width: 450px; width: 100%; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-size: 1.5rem; letter-spacing: 0.3rem; text-transform: uppercase; 
            color: #fff; margin-bottom: 10px;
        }
        
        .status-bar { 
            text-align: center; margin-bottom: 25px; padding: 15px;
            background: linear-gradient(90deg, rgba(225,29,72,0.2), transparent);
            border-left: 4px solid var(--rose); border-radius: 8px; 
            font-size: 0.9rem; font-weight: 700; letter-spacing: 0.1rem;
        }

        .board { 
            background: #120a0d; padding: 20px; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        
        /* UPDATED: Glowing Gradient Cells */
        .cell { 
            aspect-ratio: 1; 
            background: linear-gradient(135deg, #1a0f15, #2d1b24); 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.3); 
            border: 1px solid rgba(225, 29, 72, 0.4);
            box-shadow: 0 0 8px rgba(225, 29, 72, 0.2);
            position: relative;
            transition: 0.3s;
        }
        
        /* Token with intense glow */
        .token { 
            font-size: 24px; position: absolute; 
            filter: drop-shadow(0 0 8px rgba(255,255,255,1)) drop-shadow(0 0 15px var(--rose));
            z-index: 10;
        }
        
        .dice-area { display: flex; flex-direction: column; align-items: center; gap: 20px; margin: 35px 0; }
        .dice-display { 
            width: 80px; height: 80px; background: #1a0f15; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 32px; font-weight: 800; border-radius: 20px; 
            border: 2px solid var(--rose); color: var(--rose);
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.3);
        }

        .roll-btn { 
            width: 100%; padding: 20px; background: var(--rose); border: none; 
            border-radius: 16px; color: white; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 0.2rem;
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.4);
        }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 100; }
        .card { 
            background: #0d0508; border: 1px solid var(--rose); padding: 40px; 
            border-radius: 30px; text-align: center; width: 80%;
            box-shadow: 0 0 40px rgba(225, 29, 72, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Couple Game</h1></div>
    <div class="status-bar" id="status-display">VAMP'S TURN (👅)</div>
    
    <div class="board"><div class="grid" id="grid"></div></div>
    
    <div class="dice-area">
        <div class="dice-display" id="dice-val">🎲</div>
        <button class="roll-btn" id="roll-btn" onclick="rollDice()">Roll Dice</button>
    </div>
    
    <div class="overlay" id="overlay">
        <div class="card">
            <h2 id="card-square" style="color:var(--rose); margin-top:0;">SQUARE 1</h2>
            <p id="card-text" style="margin: 30px 0; font-size: 1.1rem; line-height: 1.6;">...</p>
            <div style="display:flex; gap:10px;">
                <button class="roll-btn" style="background: transparent; border: 1px solid var(--rose);" onclick="tryAgain()">Retry</button>
                <button class="roll-btn" onclick="acceptTask()">Accept</button>
            </div>
        </div>
    </div>
</div>

<script>
    const taskDatabase = { /* 1-200 tasks */ };
    let state = { p1: 1, p2: 1, active: 1, currentRoll: 0 };

    function updateStatus() {
        document.getElementById('status-display').innerText = state.active === 1 ? "VAMP'S TURN (👅)" : "RABBIT'S TURN (🐇)";
    }

    function drawBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let currentPos = state.active === 1 ? state.p1 : state.p2;
        let base = Math.min(171, Math.floor((Math.max(1, currentPos - 12) - 1) / 5) * 5 + 1);

        for(let i=0; i<30; i++) {
            let num = base + i;
            if(num > 200) break;
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = num;
            if(state.p1 === num) cell.innerHTML += '<div class="token">👅</div>';
            if(state.p2 === num) cell.innerHTML += '<div class="token">🐇</div>';
            grid.appendChild(cell);
        }
    }

    function rollDice() {
        document.getElementById('roll-btn').disabled = true;
        state.currentRoll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-val').innerText = state.currentRoll;
        animateSteps(state.currentRoll);
    }

    function animateSteps(steps) {
        if (steps <= 0) {
            document.getElementById('card-text').innerText = taskDatabase[state.active === 1 ? state.p1 : state.p2] || "Perform the task!";
            document.getElementById('card-square').innerText = `SQUARE ${state.active === 1 ? state.p1 : state.p2}`;
            document.getElementById('overlay').style.display = 'flex';
            return;
        }
        if (state.active === 1) state.p1 = Math.min(200, state.p1 + 1);
        else state.p2 = Math.min(200, state.p2 + 1);
        drawBoard();
        setTimeout(() => animateSteps(steps - 1), 300);
    }

    function tryAgain() {
        document.getElementById('overlay').style.display = 'none';
        if(state.active === 1) state.p1 = Math.max(1, state.p1 - state.currentRoll);
        else state.p2 = Math.max(1, state.p2 - state.currentRoll);
        drawBoard();
        document.getElementById('roll-btn').disabled = false;
    }

    function acceptTask() {
        document.getElementById('overlay').style.display = 'none';
        state.active = state.active === 1 ? 2 : 1;
        updateStatus();
        document.getElementById('roll-btn').disabled = false;
        document.getElementById('dice-val').innerText = "🎲";
    }

    drawBoard();
</script>
</body>
</html>
